<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McLaren Spider — Greg Hobden, Film Producer</title>
    <meta name="description" content="Producer on the McLaren Spider film, shot on location in Spain.">
    <link rel="canonical" href="https://greghobden.com/work/mclaren-spider">
    <meta property="og:title" content="McLaren Spider — Greg Hobden, Film Producer">
    <meta property="og:image" content="https://greghobden.com/images/film-grabs/spider/SPIDER_2.jpg">
    <meta property="og:url" content="https://greghobden.com/work/mclaren-spider">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CreativeWork",
      "name": "McLaren Spider",
      "description": "Some cars make the job easy. The McLaren Spider is one of them.",
      "producer": { "@type": "Person", "name": "Greg Hobden", "url": "https://greghobden.com" },
      "funder": { "@type": "Organization", "name": "McLaren" }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #080808; --fg: #EDEDE8; --mid: #888888; --gold: #F5D800; --pad: clamp(24px, 5vw, 80px); }
        html { -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--fg); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.6; }
        a { color: inherit; text-decoration: none; }
        nav { position: fixed; top: 0; left: 0; right: 0; height: 64px; display: flex; align-items: center; padding: 0 var(--pad); justify-content: space-between; z-index: 100; background: rgba(8,8,8,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #1a1a1a; }
        .nav-logo { width: 36px; height: 36px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; color: #000; font-size: 15px; }
        .nav-back { font-size: 13px; letter-spacing: 0.05em; color: var(--mid); }
        .nav-back:hover { color: var(--fg); }
        .project-hero { position: relative; height: 45vh; min-height: 320px; display: flex; align-items: flex-end; overflow: hidden; margin-top: 64px; }
        .project-hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .project-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,8,8,0.1) 0%, rgba(8,8,8,0.75) 65%, var(--bg) 100%); }
        .project-hero-text { position: relative; z-index: 1; padding: 0 var(--pad) 36px; width: 100%; }
        .project-eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
        .project-hero-text h1 { font-size: clamp(26px, 4vw, 48px); font-weight: 300; line-height: 1.1; }
        .project-details { display: flex; border-bottom: 1px solid #1a1a1a; }
        .project-detail { flex: 1; padding: 20px 24px; border-right: 1px solid #1a1a1a; }
        .project-detail:last-child { border-right: none; }
        .detail-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mid); margin-bottom: 5px; }
        .detail-value { font-size: 15px; font-weight: 300; }
        .project-body { max-width: 740px; margin: 0 auto; padding: 56px var(--pad); }
        .project-body p { font-size: 17px; font-weight: 300; line-height: 1.8; color: #ccc; margin-bottom: 20px; }
        .project-body p:first-child { font-size: 19px; color: var(--fg); }
        .watch-btn { display: inline-flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.2); padding: 11px 22px; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 8px; cursor: pointer; background: none; color: var(--fg); font-family: inherit; }
        .watch-btn:hover { border-color: var(--fg); }
        .project-gallery { border-top: 1px solid #1a1a1a; padding: 48px var(--pad) 72px; }
        .section-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mid); margin-bottom: 20px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
        @media (max-width: 640px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .project-details { flex-wrap: wrap; }
            .project-detail { flex: 0 0 50%; }
            .project-detail:nth-child(odd) { border-right: 1px solid #1a1a1a; }
            .project-detail:nth-child(even) { border-right: none; }
            .project-detail { border-bottom: 1px solid #1a1a1a; }
            .project-detail:nth-last-child(-n+2) { border-bottom: none; }
        }
        .gallery-grid img { width: 100%; aspect-ratio: 3/2; object-fit: cover; display: block; cursor: pointer; transition: opacity 0.2s; }
        .gallery-grid img:hover { opacity: 0.8; }
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; }
        .lightbox-close { position: absolute; top: 20px; right: 28px; font-size: 28px; color: var(--mid); cursor: pointer; background: none; border: none; font-family: inherit; }
        .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); font-size: 24px; color: var(--mid); cursor: pointer; background: none; border: none; font-family: inherit; padding: 16px; }
        .lightbox-prev { left: 16px; } .lightbox-next { right: 16px; }
        .lightbox-prev:hover, .lightbox-next:hover, .lightbox-close:hover { color: var(--fg); }
        .vimeo-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1001; align-items: center; justify-content: center; }
        .vimeo-modal.open { display: flex; }
        .vimeo-modal iframe { width: min(960px, 90vw); height: min(540px, 50vw); border: none; }
        .vimeo-modal-close { position: absolute; top: 20px; right: 28px; font-size: 28px; color: var(--mid); cursor: pointer; background: none; border: none; font-family: inherit; }
        .vimeo-modal-close:hover { color: var(--fg); }
        .project-cta { border-top: 1px solid #1a1a1a; padding: 44px var(--pad); display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
        .project-cta p { font-size: 15px; font-weight: 300; color: var(--mid); }
        .btn-contact { display: inline-block; padding: 11px 26px; border: 1px solid var(--gold); color: var(--gold); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }
        .btn-contact:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>
<nav>
    <a href="../index.html" class="nav-logo">G</a>
    <a href="../index.html#work" class="nav-back">← All work</a>
</nav>
<section class="project-hero">
    <img src="../images/film-grabs/spider/SPIDER_2.jpg" alt="McLaren Spider — film still" style="object-position: center 44%;">
    <div class="project-hero-text">
        <p class="project-eyebrow">Automotive Film</p>
        <h1>McLaren Spider</h1>
    </div>
</section>
<div class="project-details">
    <div class="project-detail"><div class="detail-label">Client</div><div class="detail-value">McLaren</div></div>
    <div class="project-detail"><div class="detail-label">Role</div><div class="detail-value">Producer</div></div>
    <div class="project-detail"><div class="detail-label">Location</div><div class="detail-value">Spain</div></div>
</div>
<div class="project-body">
    <p>Some cars make the job easy. The McLaren Spider is one of them.</p>
    <button class="watch-btn" id="watchBtn">▶ Watch the film</button>
</div>
<div class="project-gallery">
    <p class="section-label">Film stills</p>
    <div class="gallery-grid" id="gallery">
        <img src="../images/film-grabs/spider/SPIDER_1.jpg" alt="McLaren Spider — film still 1" loading="lazy">
        <img src="../images/film-grabs/spider/SPIDER_2.jpg" alt="McLaren Spider — film still 2" loading="lazy">
        <img src="../images/film-grabs/spider/SPIDER_3.jpg" alt="McLaren Spider — film still 3" loading="lazy">
        <img src="../images/film-grabs/spider/SPIDER_4.jpg" alt="McLaren Spider — film still 4" loading="lazy">
    </div>
</div>
<div class="project-cta">
    <p>Greg is available for new projects — documentary, automotive, experiential.</p>
    <a href="mailto:pushfilms@icloud.com" class="btn-contact">Get in touch →</a>
</div>
<div class="vimeo-modal" id="vimeoModal">
    <button class="vimeo-modal-close" id="vimeoClose">✕</button>
    <iframe id="vimeoFrame" src="" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</div>
<div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">✕</button>
    <button class="lightbox-prev" id="lbPrev">←</button>
    <img id="lbImg" src="" alt="">
    <button class="lightbox-next" id="lbNext">→</button>
</div>
<script>
    const vm = document.getElementById('vimeoModal'), vf = document.getElementById('vimeoFrame');
    document.getElementById('watchBtn').addEventListener('click', () => { vf.src = 'https://player.vimeo.com/video/1171150653?autoplay=1'; vm.classList.add('open'); });
    document.getElementById('vimeoClose').addEventListener('click', () => { vm.classList.remove('open'); vf.src = ''; });
    vm.addEventListener('click', e => { if (e.target === vm) { vm.classList.remove('open'); vf.src = ''; } });
    const imgs = Array.from(document.querySelectorAll('#gallery img'));
    const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lbImg');
    let lbIdx = 0;
    function openLb(i) { lbIdx = i; lbImg.src = imgs[i].src; lbImg.alt = imgs[i].alt; lb.classList.add('open'); }
    function closeLb() { lb.classList.remove('open'); }
    function showLb(i) { lbIdx = (i + imgs.length) % imgs.length; lbImg.src = imgs[lbIdx].src; lbImg.alt = imgs[lbIdx].alt; }
    imgs.forEach((img, i) => img.addEventListener('click', () => openLb(i)));
    document.getElementById('lbClose').addEventListener('click', closeLb);
    document.getElementById('lbPrev').addEventListener('click', () => showLb(lbIdx - 1));
    document.getElementById('lbNext').addEventListener('click', () => showLb(lbIdx + 1));
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', e => { if (!lb.classList.contains('open')) return; if (e.key === 'Escape') closeLb(); if (e.key === 'ArrowLeft') showLb(lbIdx - 1); if (e.key === 'ArrowRight') showLb(lbIdx + 1); });
</script>
</body>
</html>
